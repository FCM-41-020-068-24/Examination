<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Realistic Dream Villa VR - 3 Bedroom</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.6.1/dist/aframe-extras.min.js"></script>
  <script
    src="https://cdn.jsdelivr.net/npm/aframe-environment-component@1.3.1/dist/aframe-environment-component.min.js"></script>

  <script>
    AFRAME.registerComponent('water-motion', {
      init: function () { this.time = 0; },
      tick: function (t, dt) {
        this.time += dt / 1000;
        var mesh = this.el.getObject3D('mesh');
        if (!mesh || !mesh.geometry) return;
        if (!this.basePositions) {
          if (!mesh.geometry.attributes.position) return;
          this.basePositions = new Float32Array(mesh.geometry.attributes.position.array);
        }
        var pos = mesh.geometry.attributes.position;
        for (var i = 0; i < pos.count; i++) {
          var vx = this.basePositions[i * 3];
          var vy = this.basePositions[i * 3 + 1];
          var z = (Math.sin(vx * 2.5 + this.time * 2.0) * 0.03) +
            (Math.cos(vy * 2.5 + this.time * 1.5) * 0.03) +
            (Math.sin((vx + vy) * 1.5 - this.time * 1.0) * 0.02);
          pos.setZ(i, z);
        }
        pos.needsUpdate = true;
        mesh.geometry.computeVertexNormals();
      }
    });

    AFRAME.registerGeometry('curtain', {
      schema: {
        width: { default: 2 },
        height: { default: 4 },
        folds: { default: 6 },
        depth: { default: 0.15 }
      },
      init: function (data) {
        var geometry = new THREE.PlaneGeometry(data.width, data.height, 60, 1);
        var pos = geometry.attributes.position;
        var frequency = (Math.PI * 2 * data.folds) / data.width;
        for (var i = 0; i < pos.count; i++) {
          var x = pos.getX(i);
          var z = Math.sin(x * frequency) * data.depth;
          pos.setZ(i, z);
        }
        geometry.computeVertexNormals();
        this.geometry = geometry;
      }
    });

    AFRAME.registerComponent('patrol', {
      schema: { points: { type: 'array', default: [] }, speed: { type: 'number', default: 1 } },
      init: function () {
        this.targetIndex = 0;
        this.direction = new THREE.Vector3();
        this.wrapper = new THREE.Object3D();
      },
      tick: function (time, timeDelta) {
        if (this.data.points.length === 0) return;
        var currentPos = this.el.object3D.position;
        var targetStr = this.data.points[this.targetIndex];
        var parts = targetStr.split(' ');
        var targetPos = new THREE.Vector3(parseFloat(parts[0]), parseFloat(parts[1]), parseFloat(parts[2]));
        this.direction.subVectors(targetPos, currentPos);
        var distance = this.direction.length();

        if (distance < 0.2) {
          this.targetIndex = (this.targetIndex + 1) % this.data.points.length;
        } else {
          this.direction.normalize();
          currentPos.addScaledVector(this.direction, (this.data.speed * timeDelta) / 1000);
          var lookTarget = new THREE.Vector3().copy(targetPos);
          lookTarget.y = currentPos.y;
          this.wrapper.position.copy(currentPos);
          this.wrapper.lookAt(lookTarget);
          var diff = this.wrapper.rotation.y - this.el.object3D.rotation.y;
          while (diff < -Math.PI) diff += Math.PI * 2;
          while (diff > Math.PI) diff -= Math.PI * 2;
          this.el.object3D.rotation.y += diff * 0.05;
        }
      }
    });

    AFRAME.registerComponent('spin', {
      schema: { speed: { type: 'number', default: 90 } },
      tick: function (t, dt) { this.el.object3D.rotation.y += THREE.MathUtils.degToRad(this.data.speed * (dt / 1000)); }
    });

    AFRAME.registerComponent('toggle-door', {
      schema: { offset: { type: 'number', default: -2.4 }, dur: { type: 'number', default: 800 } },
      init: function () {
        this.isOpen = false;
        this.baseX = this.el.object3D.position.x;
        this.el.addEventListener('click', () => {
          this.isOpen = !this.isOpen;
          const targetX = this.isOpen ? this.baseX + this.data.offset : this.baseX;
          this.el.setAttribute('animation', `property: position.x; to: ${targetX}; dur: ${this.data.dur}; easing: easeInOutSine`);
        });
        this.el.addEventListener('mouseenter', () => this.el.querySelector('a-box').setAttribute('color', '#aaddff'));
        this.el.addEventListener('mouseleave', () => this.el.querySelector('a-box').setAttribute('color', '#6699cc'));
      }
    });

    AFRAME.registerComponent('day-night-toggle', {
      init: function () {
        this.isDay = true;
        this.el.addEventListener('click', () => {
          this.isDay = !this.isDay;
          const env = document.querySelector('#main-env');
          const ambient = document.querySelector('#ambient-light');
          const sun = document.querySelector('#sun-light');
          const intLights = document.querySelectorAll('.interior-light');

          if (this.isDay) {
            env.setAttribute('environment', 'preset: contact; skyType: atmosphere; lighting: none; groundColor: #3d4a36; groundColor2: #36442e;');
            ambient.setAttribute('intensity', '0.6');
            sun.setAttribute('intensity', '3');
            intLights.forEach(light => light.setAttribute('intensity', '0.8'));
            this.el.querySelector('.switch-toggle').setAttribute('position', '0 0.05 0.02');
            this.el.querySelector('.switch-toggle').setAttribute('color', '#eee');
          } else {
            env.setAttribute('environment', 'preset: contact; skyType: gradient; skyColor: #010111; horizonColor: #111122; lighting: none; groundColor: #111;');
            ambient.setAttribute('intensity', '0.05');
            sun.setAttribute('intensity', '0.05');
            intLights.forEach(light => light.setAttribute('intensity', '1.5'));
            this.el.querySelector('.switch-toggle').setAttribute('position', '0 -0.05 0.02');
            this.el.querySelector('.switch-toggle').setAttribute('color', '#555');
          }
        });
      }
    });
  </script>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background-color: #000;

    }

    #ui-overlay {

</head>

        <a-entity light="type: point; color: #fff; intensity: 0.2; distance: 8" position="0 2.5 0"></a-entity>
      </a-entity>
    </a-entity>

    <!-- Pedestrian Walkway to the House -->
    <a-plane position="0 0.04 7" rotation="-90 0 0" width="2.4" height="17.5" color="#d1d5d8"
      material="src: #concrete-col; normalMap: #concrete-nrm; roughnessMap: #concrete-rgh; repeat: 2 15; roughness: 1"
      shadow="receive: true"></a-plane>

    <!-- Road Surface (Asphalt) -->
    <a-entity id="street-area" position="0 0 20">
      <a-plane position="0 0.03 0" rotation="-90 0 0" width="60" height="9" color="#181a1c"
        material="src: #concrete-col; normalMap: #concrete-nrm; roughnessMap: #concrete-rgh; repeat: 120 18; roughness: 1; metalness: 0"
        shadow="receive: true"></a-plane>
      <a-plane position="-15 0.04 0" rotation="-90 0 0" width="4" height="0.2" color="#e8c323"></a-plane>
      <a-plane position="-5 0.04 0" rotation="-90 0 0" width="4" height="0.2" color="#e8c323"></a-plane>
      <a-plane position="5 0.04 0" rotation="-90 0 0" width="4" height="0.2" color="#e8c323"></a-plane>
      <a-plane position="15 0.04 0" rotation="-90 0 0" width="4" height="0.2" color="#e8c323"></a-plane>
      <a-plane position="0 0.04 -4" rotation="-90 0 0" width="60" height="0.15" color="#fff"></a-plane>
      <a-plane position="0 0.04 4" rotation="-90 0 0" width="60" height="0.15" color="#fff"></a-plane>
    </a-entity>

    <!-- ==========================================
           GARDEN & TREES
           ========================================== -->
    <a-entity id="garden">
      <a-entity position="12 0 15">
        <a-cylinder position="0 1.5 0" radius="0.3" height="3" color="#5c432b"
          material="src: #wood-col; normalMap: #wood-nrm; roughnessMap: #wood-rgh; repeat: 1 3"
          shadow="cast: true"></a-cylinder>
        <a-sphere position="0 3.5 0" radius="1.8" color="#2b5e34"
          material="src: #leaf-col; normalMap: #leaf-nrm; roughnessMap: #leaf-rgh; repeat: 4 4"
          shadow="cast: true"></a-sphere>
      </a-entity>
      <a-entity position="-18 0 6">
        <a-cylinder position="0 1.2 0" radius="0.2" height="2.4" color="#5c432b"
          material="src: #wood-col; normalMap: #wood-nrm; roughnessMap: #wood-rgh; repeat: 1 2.4"
          shadow="cast: true"></a-cylinder>
        <a-sphere position="0 2.8 0" radius="1.5" color="#2b5e34"
          material="src: #leaf-col; normalMap: #leaf-nrm; roughnessMap: #leaf-rgh; repeat: 3 3"
          shadow="cast: true"></a-sphere>
      </a-entity>
    </a-entity>

  </a-scene>
</body>

</html>
